<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éclipse Artificielle</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .welcome-eyebrow {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.65rem;
            letter-spacing: 6px;
            color: var(--accent);
            opacity: 0.6;
            text-transform: uppercase;
            margin-bottom: 30px;
            animation: wFadeIn 1.4s ease-out 0.3s both;
        }

        .welcome-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.8rem, 9vw, 6.5rem);
            font-weight: 700;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 8px;
            line-height: 1.1;
            margin-bottom: 8px;
            animation: wFadeIn 1.4s ease-out 0.5s both;
        }

        .welcome-title .accent-word {
            color: var(--accent);
            text-shadow: 0 0 40px rgba(241, 196, 15, 0.45);
        }

        .welcome-tagline {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(0.9rem, 2vw, 1.2rem);
            color: rgba(224, 230, 237, 0.45);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 80px;
            animation: wFadeIn 1.4s ease-out 0.8s both;
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 18px 56px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-decoration: none;
            background: transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s, box-shadow 0.4s;
            animation: wFadeIn 1.4s ease-out 1.2s both;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.45s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 0;
        }

        .enter-btn span { position: relative; z-index: 1; }

        .enter-btn:hover { color: #000; box-shadow: 0 0 50px rgba(241,196,15,0.35); }
        .enter-btn:hover::before { transform: scaleX(1); }

        .ring {
            position: fixed;
            border-radius: 50%;
            border: 1px solid rgba(241, 196, 15, 0.04);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ringPulse 7s ease-in-out infinite;
        }
        .ring:nth-child(1) { width: 380px; height: 380px; }
        .ring:nth-child(2) { width: 620px; height: 620px; animation-delay: 1.2s; border-color: rgba(241,196,15,0.025); }
        .ring:nth-child(3) { width: 880px; height: 880px; animation-delay: 2.4s; border-color: rgba(241,196,15,0.015); }

        @keyframes ringPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes wFadeIn {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>

    <div class="welcome-wrapper">
        <p class="welcome-eyebrow">Webdocumentaire · BUT Informatique Toulouse</p>
        <h1 class="welcome-title">ÉCLIPSE<br><span class="accent-word">ARTIFICIELLE</span></h1>
        <p class="welcome-tagline">Quand la ville éteint les étoiles</p>
        <a href="index.html" class="enter-btn" id="enter-btn">
            <span>▶&nbsp;&nbsp;Explorer</span>
        </a>
    </div>

    <script src="stars.js"></script>
    <script>
    (function () {
        const overlay = document.createElement('div');
        overlay.id = 'warp-overlay';
        overlay.innerHTML = '<canvas id="warp-canvas"></canvas>';
        document.body.appendChild(overlay);

        const s = document.createElement('style');
        s.textContent = `
            #warp-overlay { position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0; }
            #warp-overlay.active { pointer-events:all; }
            #warp-canvas { position:absolute;inset:0;width:100%;height:100%;background:#000; }
        `;
        document.head.appendChild(s);

        const wc = document.getElementById('warp-canvas');
        const wx = wc.getContext('2d');
        const DURATION = 1600;
        const pts = [];

        function resize() { wc.width = window.innerWidth; wc.height = window.innerHeight; }

        function initPts() {
            pts.length = 0;
            const cx = wc.width/2, cy = wc.height/2;
            for (let i = 0; i < 300; i++) {
                const a = Math.random()*Math.PI*2;
                const d = Math.random()*Math.hypot(cx,cy)*0.6+20;
                pts.push({ x: cx+Math.cos(a)*d, y: cy+Math.sin(a)*d,
                    speed: Math.random()*3+1.5, len: Math.random()*2+1,
                    br: Math.random()*0.5+0.5 });
            }
        }

        function ease(t) { return t*t*t; }

        function draw(p) {
            const W=wc.width, H=wc.height, cx=W/2, cy=H/2;
            wx.fillStyle = `rgba(0,0,0,${p<0.6?0.25+p*0.2:0.05})`;
            wx.fillRect(0,0,W,H);
            const sm = p<0.6 ? ease(p/0.6)*15 : 15+ease((p-0.6)/0.4)*60;
            const tm = p<0.6 ? 1+ease(p/0.6)*8 : 9+ease((p-0.6)/0.4)*40;
            pts.forEach(pt => {
                const dx=pt.x-cx, dy=pt.y-cy, dist=Math.sqrt(dx*dx+dy*dy);
                const nx=dx/dist, ny=dy/dist;
                pt.x+=nx*pt.speed*sm; pt.y+=ny*pt.speed*sm;
                if(pt.x<0||pt.x>W||pt.y<0||pt.y>H){
                    const a=Math.random()*Math.PI*2, r=Math.random()*30+5;
                    pt.x=cx+Math.cos(a)*r; pt.y=cy+Math.sin(a)*r; pt.speed=Math.random()*3+1.5;
                }
                const tl=pt.len*tm, tx=pt.x-nx*tl, ty=pt.y-ny*tl;
                const g=wx.createLinearGradient(tx,ty,pt.x,pt.y);
                g.addColorStop(0,'rgba(0,0,0,0)');
                g.addColorStop(1,`rgba(255,255,255,${pt.br})`);
                wx.beginPath(); wx.moveTo(tx,ty); wx.lineTo(pt.x,pt.y);
                wx.strokeStyle=g; wx.lineWidth=1.5; wx.stroke();
            });
            if(p>0.75){ wx.fillStyle=`rgba(255,255,255,${ease((p-0.75)/0.25)*0.9})`; wx.fillRect(0,0,W,H); }
        }

        function startWarp(href) {
            resize(); initPts();
            overlay.style.opacity='1'; overlay.classList.add('active');
            let t0=null;
            function tick(ts){
                if(!t0) t0=ts;
                const p=Math.min((ts-t0)/DURATION,1);
                draw(p);
                p<1 ? requestAnimationFrame(tick) : (window.location.href=href);
            }
            requestAnimationFrame(tick);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('enter-btn').addEventListener('click', function(e){
                e.preventDefault(); startWarp(this.getAttribute('href'));
            });
        });
        window.addEventListener('resize', resize);
    })();
    </script>
</body>
</html>

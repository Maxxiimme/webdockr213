<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Éclipse Artificielle | Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Nodes purement décoratifs — pas de cursor pointer, pas de hover actif */
        .node {
            position: absolute;
            z-index: 10;
            text-decoration: none;
            transform: translate(-50%, -50%);
            pointer-events: none; /* NON CLIQUABLE */
            cursor: default;
        }

        .node-content {
            width: 110px;
            height: 110px;
            background: rgba(40, 42, 58, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }

        .node span {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(241, 196, 15, 0.55);
            text-align: center;
            letter-spacing: 1.5px;
            padding: 8px;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
        }

        /* --- BOUTON COMMENCER fixé en bas à droite --- */
        .start-zone {
            position: fixed;
            bottom: 40px;
            right: 50px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 100;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        .start-hint {
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.68rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(224, 230, 237, 0.3);
        }

        .start-btn {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            padding: 16px 52px;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-decoration: none;
            background: transparent;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s, box-shadow 0.4s;
        }

        .start-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.45s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 0;
        }

        .start-btn span { position: relative; z-index: 1; }

        .start-btn:hover {
            color: #000;
            box-shadow: 0 0 45px rgba(241, 196, 15, 0.4);
        }

        .start-btn:hover::before { transform: scaleX(1); }

        .start-btn .arrow {
            position: relative;
            z-index: 1;
            transition: transform 0.3s;
        }
        .start-btn:hover .arrow { transform: translateX(5px); }
    </style>
</head>
<body>
    <canvas id="star-canvas"></canvas>

    <div class="hub-wrapper">
        <header class="hub-header">
            <h1>ÉCLIPSE ARTIFICIELLE</h1>
            <h2 class="subtitle">Quand la ville éteint les étoiles</h2>
            <p class="subtitle" style="font-family:'Rajdhani';font-size:0.8rem;letter-spacing:2px;opacity:0.45;text-transform:uppercase;border:none;padding:0;margin-top:4px;">
                Explorez le webdocumentaire
            </p>
        </header>

        <main class="constellation-nav" id="hub-container">
            <svg class="constellation-lines" id="constellation-svg"></svg>

            <!-- Nodes DÉCORATIFS uniquement (pointer-events: none via CSS) -->
            <div class="node n1"><div class="node-content"><span>Science</span></div></div>
            <div class="node n2"><div class="node-content"><span>Data</span></div></div>
            <div class="node n3"><div class="node-content"><span>Vivant</span></div></div>
            <div class="node n4"><div class="node-content"><span>Militants</span></div></div>
            <div class="node n5"><div class="node-content"><span>Futur</span></div></div>
            <div class="node n6"><div class="node-content"><span>Bilan</span></div></div>

            <div class="core-point"></div>
        </main>

        <footer class="hub-footer">
            <p style="font-size:0.68rem;letter-spacing:2px;color:rgba(224,230,237,0.2);text-align:center;">
                Projet R2.13 — BUT Informatique Toulouse
            </p>
        </footer>
    </div>

    <!-- Bouton Commencer fixé en bas à droite -->
    <div class="start-zone">
        <span class="start-hint">Début du parcours</span>
        <a href="science.html" class="start-btn">
            <span>Commencer</span>
            <span class="arrow">→</span>
        </a>
    </div>

    <script src="stars.js"></script>
    <script src="constellation-lines.js"></script>
    <script src="crewmate.js"></script>
</body>
</html>
